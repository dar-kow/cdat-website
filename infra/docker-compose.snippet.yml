# Snippet to APPEND to the VPS main compose file (e.g. /srv/docker-compose.yml).
# Do NOT replace the existing compose - only add the `cdat-website:` service entry
# and (if missing) the `nginx-proxy-network:` external network reference at the
# bottom under `networks:`.
#
# Pre-req:
# - nginx-proxy + acme-companion running on the VPS (42+ containers already use it)
# - Cloudflare zone `sdet.it` with `cdat.sdet.it` proxied A-record (SDE-94)
# - CF SSL/TLS mode = Full (strict). LE cert on origin satisfies this.
#
# TLS path: CF (orange cloud) → host nginx-proxy + acme-companion (Let's Encrypt) → container HTTP :4399.
# acme-companion HTTP-01 challenge passes through CF by default; renewals work auto.

services:
  cdat-website:
    # Built locally first time then `docker save | ssh | docker load`. After
    # SDE-97 (auto-deploy via self-hosted runner), the image is rebuilt by GHA
    # on push to main and the runner runs `docker compose up -d --force-recreate`.
    image: cdat-website:latest
    container_name: cdat-website
    restart: unless-stopped
    networks:
      - nginx-proxy-network
    environment:
      # nginx-proxy reads VIRTUAL_HOST + VIRTUAL_PORT to route incoming
      # requests for cdat.sdet.it to this container's port 4399.
      VIRTUAL_HOST: cdat.sdet.it
      VIRTUAL_PORT: 4399
      # acme-companion auto-issues + renews Let's Encrypt cert for this vhost.
      LETSENCRYPT_HOST: cdat.sdet.it
      LETSENCRYPT_EMAIL: d.kowalski@crehler.com
    # Resource budget - 384MB RAM cap (Node Astro hybrid is heavier than
    # static nginx; bumped from 256MB to leave headroom for SSE streams).
    mem_limit: 384m
    mem_reservation: 96m
    cpu_shares: 128

networks:
  nginx-proxy-network:
    external: true
