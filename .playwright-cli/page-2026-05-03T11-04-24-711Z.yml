    - region "Three Zero Rules" [ref=e62]:
      - generic [ref=e63]:
        - heading "Three Zero Rules" [level=2] [ref=e64]
        - paragraph [ref=e65]: Three bright lines that keep tests reliable, readable, and maintainable. Toggle each card to compare bad versus good code.
      - generic [ref=e66]:
        - article [ref=e67]:
          - generic [ref=e68]:
            - generic [ref=e69]:
              - text: Zero
              - code [ref=e70]: any
            - heading "Type Safety Without Compromise" [level=3] [ref=e71]
          - switch "Toggle to good example for Zero any" [ref=e73] [cursor=pointer]:
            - generic [ref=e74]: ❌ Bad
            - generic [ref=e75]: ✅ Good
          - code [ref=e79]:
            - generic [ref=e80]: "async getProductData(): Promise<any> {"
            - generic [ref=e81]: return await page.evaluate(() => fetch('/api/product').then((r) => r.json()));
            - generic [ref=e82]: "}"
          - paragraph [ref=e83]: TypeScript any defeats the entire purpose of type checking. ESLint rule @typescript-eslint/no-explicit-any enforced. Every function signature must specify its return type. Generics over any, always.
        - article [ref=e84]:
          - generic [ref=e85]:
            - generic [ref=e86]:
              - text: Zero
              - code [ref=e87]: waitForTimeout
            - heading "Smart Waits Only" [level=3] [ref=e88]
          - switch "Toggle to good example for Zero waitForTimeout" [ref=e90] [cursor=pointer]:
            - generic [ref=e91]: ❌ Bad
            - generic [ref=e92]: ✅ Good
          - code [ref=e96]:
            - generic [ref=e97]: await page.waitForTimeout(5000);
            - generic [ref=e98]: await button.click();
          - paragraph [ref=e99]: Hardcoded delays are flaky and slow. They fail on slow CI, succeed on fast dev machines, and waste time when elements load fast. Smart waits target the actual condition, not arbitrary time.
        - article [ref=e100]:
          - generic [ref=e101]:
            - generic [ref=e102]:
              - text: Zero
              - code [ref=e103]: else
            - heading "Early Returns Over Pyramids" [level=3] [ref=e104]
          - switch "Toggle to good example for Zero else" [ref=e106] [cursor=pointer]:
            - generic [ref=e107]: ❌ Bad
            - generic [ref=e108]: ✅ Good
          - code [ref=e112]:
            - generic [ref=e113]: "if (user.isValid) {"
            - generic [ref=e114]: "if (user.hasPermission) {"
            - generic [ref=e115]: processOrder(user);
            - generic [ref=e116]: "} else {"
            - generic [ref=e117]: throw new Error('No permission');
            - generic [ref=e118]: "}"
            - generic [ref=e119]: "} else {"
            - generic [ref=e120]: throw new Error('Invalid user');
            - generic [ref=e121]: "}"
          - paragraph [ref=e122]: Nested if-else creates pyramids of indentation that obscure logic flow. Early returns flatten the code, making each precondition explicit and the happy path obvious.
