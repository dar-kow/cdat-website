      - generic [ref=e210]:
        - heading "Why split into 4 files?" [level=3] [ref=e211]
        - list [ref=e212]:
          - listitem [ref=e213]:
            - strong [ref=e214]: Separation of concerns
            - text: — locators, data, behavior, and assertions never share a file.
          - listitem [ref=e215]:
            - strong [ref=e216]: Dependency direction
            - text: — Components and Data have zero dependencies; Actions consume both; Tests consume all three.
          - listitem [ref=e217]:
            - strong [ref=e218]: Reusability
            - text: — Actions can compose other Actions, locators can be shared, data fixtures stay typed.
