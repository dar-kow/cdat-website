        - heading "Why this structure for one feature?" [level=2] [ref=e118]
        - paragraph [ref=e119]: You’re testing one form. Why four files?
        - list [ref=e120]:
          - listitem [ref=e121]:
            - strong [ref=e122]:
              - code [ref=e123]: components.ts
            - text: - when the login form’s HTML changes (and it will), you change one file. The selector strategy stays in one place.
          - listitem [ref=e124]:
            - strong [ref=e125]:
              - code [ref=e126]: data.ts
            - text: - when QA needs a new test user, they add a fixture. No git diff in
            - code [ref=e127]: test.ts
            - text: for data churn.
          - listitem [ref=e128]:
            - strong [ref=e129]:
              - code [ref=e130]: actions.ts
            - text: -
            - code [ref=e131]: login(creds)
            - text: is reusable. The next feature that needs an authed session imports
            - code [ref=e132]: LoginActions
            - text: and calls
            - code [ref=e133]: login(VALID_USER)
            - text: . No copy-paste.
          - listitem [ref=e134]:
            - strong [ref=e135]:
              - code [ref=e136]: test.ts
            - text: - assertions are clearly demarcated. If a test fails, you know exactly which scenario broke; the assertion is right there.
        - note [ref=e137]:
          - paragraph [ref=e138]: 💡 When to break out into more files
          - paragraph [ref=e140]:
            - text: When a feature has 3+ user flows (e.g., “login”, “logout”, “password reset” all in
            - code [ref=e141]: auth/
            - text: ), keep them in
            - strong [ref=e142]: one
            - text: Actions class with multiple methods. Don’t split until you’re hitting 500+ lines.
