<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="CDAT Pattern">
  <title>CDAT Pattern</title>
  <rect width="32" height="32" rx="5" fill="#0a0e0d"/>
  <!-- Connectors: Components/Data → Actions → Tests -->
  <g stroke="#00ff41" stroke-width="1" stroke-linecap="round" opacity="0.45" fill="none">
    <path d="M 10 9.5 L 15 13"/>
    <path d="M 22 9.5 L 17 13"/>
    <path d="M 16 19.5 L 16 22.5"/>
  </g>
  <!-- 4 layers: C  D / A / T -->
  <g fill="#00ff41">
    <rect x="4"  y="3"  width="10" height="6" rx="1.4"/>
    <rect x="18" y="3"  width="10" height="6" rx="1.4"/>
    <rect x="11" y="13" width="10" height="6" rx="1.4"/>
    <rect x="11" y="23" width="10" height="6" rx="1.4"/>
  </g>
</svg>
